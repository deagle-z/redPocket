<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thai Elite Lobby - Global Jackpot</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+Thai:wght@700&display=swap');

      :root {
        --velvet: #1a0000;
        --thai-red: #8b0000;
        --thai-gold: linear-gradient(180deg, #fff5c3 0%, #ffbb00 45%, #e19d00 55%, #8b4513 100%);
        --liquid-gold: linear-gradient(135deg, #fff5c3 0%, #ffbb00 25%, #8b4513 50%, #ffbb00 75%, #fff5c3 100%);
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: var(--velvet);
        font-family: 'Montserrat', 'Noto Sans Thai', sans-serif;
        overflow: hidden;
        perspective: 1500px;
      }

      /* 1. 环境呼吸灯 */
      .ambient-glow {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center, var(--thai-red) 0%, transparent 70%);
        pointer-events: none;
        z-index: 1;
        animation: ambientPulse 2s infinite ease-in-out;
      }
      @keyframes ambientPulse {
        0%,
        100% {
          opacity: 0.4;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(1.1);
        }
      }

      /* 2. 全局顶部奖池面板 (Standalone Jackpot) */
      .global-jackpot-wrapper {
        position: absolute;
        top: 50px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        text-align: center;
        pointer-events: none;
      }

      .jackpot-base {
        background: rgba(0, 0, 0, 0.6);
        padding: 15px 60px;
        border-radius: 20px;
        border: 2px solid #ffbb00;
        box-shadow:
          0 0 30px rgba(0, 0, 0, 0.8),
          inset 0 0 20px rgba(255, 184, 0, 0.2);
        position: relative;
        animation: jpPanelPulse 2s infinite ease-in-out;
      }

      @keyframes jpPanelPulse {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
        50% {
          box-shadow: 0 0 40px rgba(255, 184, 0, 0.3);
          border-color: #fff;
        }
      }

      .jp-label {
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 5px;
        margin-bottom: 5px;
      }

      .jp-amount-box {
        display: flex;
        align-items: center;
        gap: 15px;
        font-size: 56px;
        font-weight: 900;
        background: var(--thai-gold);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.8));
      }

      .jp-currency {
        font-size: 40px;
        -webkit-text-fill-color: #ffbb00;
      }

      /* 更新时的闪光动画 */
      .jp-update-flash {
        animation: jpFlash 0.5s ease-out;
      }
      @keyframes jpFlash {
        0% {
          transform: scale(1);
          filter: brightness(1);
        }
        30% {
          transform: scale(1.05);
          filter: brightness(2) drop-shadow(0 0 20px #ffbb00);
        }
        100% {
          transform: scale(1);
          filter: brightness(1);
        }
      }

      /* 3. 卡片展示区 */
      .lobby-wrapper {
        display: flex;
        gap: 40px;
        z-index: 10;
        margin-top: 120px;
      }

      .card {
        width: 380px;
        height: 480px;
        background: rgba(10, 2, 2, 0.98);
        border-radius: 45px;
        position: relative;
        cursor: pointer;
        transform-style: preserve-3d;
        transition: transform 0.1s ease-out;
        border: 1px solid #5d1a1a;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
        overflow: hidden;
      }

      .card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 45px;
        padding: 3px;
        background: var(--liquid-gold);
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      /* 状态角标 */
      .badge {
        position: absolute;
        top: 20px;
        right: -35px;
        width: 150px;
        padding: 6px 0;
        transform: rotate(45deg);
        font-size: 14px;
        font-weight: 900;
        color: white;
        z-index: 10;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
      }
      .badge-hot {
        background: linear-gradient(90deg, #ff4d00, #ff8a00);
        animation: badgeGlow 1s infinite alternate;
      }
      .badge-new {
        background: linear-gradient(90deg, #ffcc00, #ff9900);
        color: #000;
      }

      @keyframes badgeGlow {
        from {
          filter: brightness(1);
        }
        to {
          filter: brightness(1.3) drop-shadow(0 0 10px #ff4d00);
        }
      }

      /* 内容层 */
      .content {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transform: translateZ(80px);
        pointer-events: none;
      }
      #lottie-bomb {
        width: 220px;
        height: 220px;
      }
      .title-h2 {
        margin: 20px 0 0 0;
        font-size: 38px;
        background: var(--thai-gold);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .pill {
        padding: 10px 45px;
        border-radius: 50px;
        font-size: 32px;
        font-weight: 900;
        border: 3px solid #ffbb00;
      }
      .odd {
        background: #ffbb00;
        color: #1a0000;
        transform: rotate(-3deg);
        margin-bottom: 12px;
      }
      .even {
        background: #1a0000;
        color: #ffbb00;
        transform: rotate(3deg);
      }

      canvas {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 5;
      }
      .sweep {
        position: absolute;
        top: 0;
        left: -150%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        transform: skewX(-25deg);
        z-index: 7;
      }
      .card:hover .sweep {
        left: 150%;
        transition: 0.8s;
      }
    </style>
  </head>
  <body>
    <div class="ambient-glow"></div>

    <!-- 全局独立奖池 -->
    <div class="global-jackpot-wrapper">
      <div class="jackpot-base" id="jackpot-trigger">
        <div class="jp-label">GRAND PRIZE POOL</div>
        <div class="jp-amount-box">
          <span class="jp-currency">฿</span>
          <span id="global-jackpot-num">2,588,000</span>
        </div>
      </div>
    </div>

    <script>
      const BOMB_JSON = {
        v: '5.5.0',
        fr: 30,
        ip: 0,
        op: 60,
        w: 200,
        h: 200,
        nm: 'B',
        ddd: 0,
        assets: [],
        layers: [
          {
            ddd: 0,
            ind: 1,
            ty: 4,
            nm: 'S',
            ks: {
              o: {
                a: 1,
                k: [
                  { t: 0, s: [100] },
                  { t: 5, s: [0] },
                  { t: 10, s: [100] },
                ],
              },
              p: { k: [130, 50] },
              s: {
                a: 1,
                k: [
                  { t: 0, s: [80, 80] },
                  { t: 5, s: [150, 150] },
                  { t: 10, s: [80, 80] },
                ],
              },
            },
            shapes: [
              {
                ty: 'gr',
                it: [
                  { d: 1, ty: 'el', s: { k: [20, 20] }, p: { k: [0, 0] } },
                  { ty: 'fl', c: { k: [1, 0.9, 0.2, 1] } },
                ],
              },
            ],
          },
          {
            ddd: 0,
            ind: 2,
            ty: 4,
            nm: 'F',
            ks: { p: { k: [115, 75] }, r: { k: -15 } },
            shapes: [
              {
                ty: 'gr',
                it: [
                  { ty: 'rc', s: { k: [6, 35] }, p: { k: [0, 0] } },
                  { ty: 'fl', c: { k: [0.4, 0.2, 0.1, 1] } },
                ],
              },
            ],
          },
          {
            ddd: 0,
            ind: 3,
            ty: 4,
            nm: 'B',
            ks: {
              p: { k: [100, 125] },
              s: {
                a: 1,
                k: [
                  { t: 0, s: [100, 100] },
                  { t: 30, s: [108, 108] },
                  { t: 60, s: [100, 100] },
                ],
              },
            },
            shapes: [
              {
                ty: 'gr',
                it: [
                  { d: 1, ty: 'el', s: { k: [130, 130] }, p: { k: [0, 0] } },
                  { ty: 'fl', c: { k: [0.1, 0.1, 0.1, 1] } },
                ],
              },
              {
                ty: 'gr',
                it: [
                  { d: 1, ty: 'el', s: { k: [120, 120] }, p: { k: [-4, -4] } },
                  { ty: 'st', c: { k: [1, 0.8, 0, 1] }, w: { k: 3 } },
                ],
              },
            ],
          },
        ],
      }

      /**
       * 全局奖池数字滚动逻辑
       */
      class GlobalJackpot {
        constructor(id, triggerId, initial) {
          this.numEl = document.getElementById(id)
          this.triggerEl = document.getElementById(triggerId)
          this.target = initial
          this.display = initial
          this.init()
        }
        init() {
          this.update()
          // 模拟每 3 秒增长一次
          setInterval(() => this.add(Math.random() * 500 + 200), 3000)
        }
        add(val) {
          this.target += val
          // 触发闪光动效
          this.triggerEl.classList.remove('jp-update-flash')
          void this.triggerEl.offsetWidth
          this.triggerEl.classList.add('jp-update-flash')
          this.roll()
        }
        roll() {
          const diff = this.target - this.display
          if (Math.abs(diff) > 0.1) {
            this.display += diff * 0.12
            this.update()
            requestAnimationFrame(() => this.roll())
          } else {
            this.display = this.target
            this.update()
          }
        }
        update() {
          this.numEl.innerText = Math.floor(this.display).toLocaleString('en-US')
        }
      }

      /**
       * 物理金币
       */
      class Coin {
        constructor(canvas) {
          this.canvas = canvas
          this.ctx = canvas.getContext('2d')
          this.reset()
        }
        reset() {
          this.x = Math.random() * (this.canvas.width - 60) + 30
          this.y = -50
          this.vx = (Math.random() - 0.5) * 4
          this.vy = Math.random() * 2 + 1
          this.gravity = 0.15
          this.bounce = 0.4
          this.radius = 12
          this.rotation = Math.random() * 360
        }
        update() {
          this.vy += this.gravity
          this.x += this.vx
          this.y += this.vy
          if (this.y + this.radius > this.canvas.height - 30) {
            this.y = this.canvas.height - 30 - this.radius
            this.vy *= -this.bounce
          }
          this.rotation += 5
        }
        draw() {
          const ctx = this.ctx
          ctx.save()
          ctx.translate(this.x, this.y)
          ctx.rotate((this.rotation * Math.PI) / 180)
          ctx.beginPath()
          ctx.arc(0, 0, this.radius, 0, Math.PI * 2)
          const g = ctx.createLinearGradient(-12, -12, 12, 12)
          g.addColorStop(0, '#fff5c3')
          g.addColorStop(0.5, '#ffbb00')
          g.addColorStop(1, '#8b4513')
          ctx.fillStyle = g
          ctx.fill()
          ctx.strokeStyle = '#fff'
          ctx.lineWidth = 1
          ctx.stroke()
          ctx.fillStyle = 'rgba(0,0,0,0.6)'
          ctx.font = 'bold 12px Arial'
          ctx.textAlign = 'center'
          ctx.textBaseline = 'middle'
          ctx.fillText('฿', 0, 0)
          ctx.restore()
        }
      }

      window.onload = function () {
        // 初始化全局奖池
        new GlobalJackpot('global-jackpot-num', 'jackpot-trigger', 2588000)

        // 初始化 Lottie
        if (typeof lottie !== 'undefined') {
          lottie.loadAnimation({
            container: document.getElementById('lottie-bomb'),
            renderer: 'svg',
            loop: true,
            autoplay: true,
            animationData: BOMB_JSON,
          })
        }

        // 初始化金币
        initCoinRain('canvas-bomb')
        initCoinRain('canvas-oe')

        // 视差倾斜
        document.querySelectorAll('.card').forEach((card) => {
          card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect()
            const x = (e.clientX - rect.left) / rect.width
            const y = (e.clientY - rect.top) / rect.height
            card.style.transform = `rotateX(${(y - 0.5) * -12}deg) rotateY(${(x - 0.5) * 12}deg) scale(1.03)`
          })
          card.addEventListener('mouseleave', () => (card.style.transform = 'rotateX(0) rotateY(0) scale(1)'))
        })
      }

      function initCoinRain(id) {
        const canvas = document.getElementById(id)
        const ctx = canvas.getContext('2d')
        canvas.width = 380
        canvas.height = 480
        const coins = []
        function frame() {
          ctx.clearRect(0, 0, canvas.width, canvas.height)
          if (coins.length < 8 && Math.random() < 0.015) coins.push(new Coin(canvas))
          coins.forEach((p) => {
            p.update()
            p.draw()
            if (Math.abs(p.vy) < 0.1 && p.y > canvas.height - 40) p.reset()
          })
          requestAnimationFrame(frame)
        }
        frame()
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Thai Gaming Lobby</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+Thai:wght@700&display=swap');

      :root {
        --velvet: radial-gradient(circle at center, #8b0000 0%, #4a0000 50%, #2a0000 100%);
        --liquid-gold: linear-gradient(135deg, #fff5c3 0%, #ffbb00 25%, #8b4513 50%, #ffbb00 75%, #fff5c3 100%);
        --glow: 0 0 20px rgba(255, 184, 0, 0.5);
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--velvet);
        font-family: 'Montserrat', 'Noto Sans Thai', sans-serif;
        overflow: hidden;
      }

      /* 天鹅绒纹理覆盖层 */
      body::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.05;
        pointer-events: none;
      }

      .lobby-wrapper {
        display: flex;
        gap: 40px;
        z-index: 10;
        perspective: 1000px;
      }

      /* --- 卡片主容器 --- */
      .card {
        width: 360px;
        height: 480px;
        background: rgba(30, 5, 5, 0.9);
        border-radius: 40px;
        position: relative;
        cursor: pointer;
        transform-style: preserve-3d;
        transition: transform 0.1s ease-out;
        border: 2px solid #5d1a1a;
        box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
        overflow: hidden;
      }

      /* 24K 液态金边框高光点 */
      .card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 40px;
        padding: 3px;
        background: var(--liquid-gold);
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        filter: drop-shadow(0 0 5px #ffbb00);
      }

      /* 泰式火焰纹 (Kranok) 装饰 */
      .kranok {
        position: absolute;
        width: 80px;
        height: 80px;
        fill: #ffbb00;
        opacity: 0.6;
        z-index: 2;
      }
      .kranok-tl {
        top: 15px;
        left: 15px;
        transform: rotate(0deg);
      }
      .kranok-br {
        bottom: 15px;
        right: 15px;
        transform: rotate(180deg);
      }

      /* 背后旋转放射光 (Sunburst) */
      .sunburst {
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: conic-gradient(from 0deg, transparent 0deg, rgba(255, 215, 0, 0.05) 15deg, transparent 30deg);
        animation: rotateSun 20s linear infinite;
        pointer-events: none;
      }
      @keyframes rotateSun {
        to {
          transform: rotate(360deg);
        }
      }

      /* --- 核心视觉 (视差层) --- */
      .visual-container {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transform: translateZ(50px); /* 视差深度 */
      }

      /* 炸弹 - 模拟 Lottie 动态 */
      .bomb-wrapper {
        position: relative;
        animation: squash 3s infinite ease-in-out;
      }
      .bomb-main {
        width: 140px;
        height: 140px;
        background: radial-gradient(circle at 30% 30%, #555, #000);
        border-radius: 50%;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.6),
          inset -5px -5px 15px rgba(255, 255, 255, 0.1);
      }
      .fuse {
        position: absolute;
        top: -30px;
        left: 50%;
        width: 6px;
        height: 40px;
        background: #3d2b1f;
        transform: translateX(-50%) rotate(15deg);
        border-radius: 3px;
      }
      .spark {
        position: absolute;
        top: -45px;
        left: 55%;
        font-size: 30px;
        filter: drop-shadow(0 0 10px #ff0000);
        animation: sparkler 0.1s infinite alternate;
      }

      /* 奇偶英文 - 霓虹自发光 */
      .pill-group {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .pill {
        padding: 12px 40px;
        border-radius: 100px;
        font-size: 34px;
        font-weight: 900;
        letter-spacing: 2px;
        border: 3px solid #ffbb00;
        text-shadow: var(--glow);
        box-shadow:
          var(--glow),
          inset 0 0 10px rgba(255, 184, 0, 0.3);
      }
      .odd {
        background: #ffbb00;
        color: #1a0000;
        transform: rotate(-3deg);
      }
      .even {
        background: #1a0000;
        color: #ffbb00;
        transform: rotate(3deg);
      }

      /* --- 信息层 --- */
      .jackpot-counter {
        margin-top: 20px;
        color: #ffbb00;
        font-size: 24px;
        font-weight: 900;
        text-shadow: 0 0 10px rgba(255, 184, 0, 0.8);
      }

      .hot-tag {
        position: absolute;
        top: 30px;
        right: -30px;
        background: linear-gradient(90deg, #ff8a00, #e52d27);
        padding: 5px 40px;
        transform: rotate(45deg);
        font-size: 12px;
        font-weight: bold;
        color: white;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .win-ticker {
        position: absolute;
        bottom: 80px;
        width: 80%;
        background: rgba(0, 0, 0, 0.5);
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 11px;
        color: #aaa;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
      }

      /* --- 金币 Canvas --- */
      canvas {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 5;
      }

      @keyframes sparkler {
        from {
          opacity: 0.8;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1.2);
        }
      }
      @keyframes squash {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05, 0.95);
        }
      }
    </style>
  </head>
  <body>
    <div class="lobby-wrapper">
      <!-- 卡片 1: BOMB -->
      <div class="card" id="card1">
        <div class="sunburst"></div>
        <div class="hot-tag">99+ PLAYING</div>

        <svg class="kranok kranok-tl" viewBox="0 0 100 100">
          <path d="M10 90 Q 10 10 90 10 L 70 30 Q 30 30 30 70 Z" />
        </svg>

        <canvas id="canvas1"></canvas>

        <div class="visual-container">
          <div class="bomb-wrapper">
            <div class="fuse"></div>
            <div class="spark">✨</div>
            <div class="bomb-main"></div>
          </div>
          <div class="jackpot-counter">฿ 1,250,000</div>
          <div class="win-ticker">User 77*** won ฿4,500</div>
          <div style="margin-top: 80px; text-align: center">
            <h2 style="color: white; margin: 0; font-size: 28px">BOMB</h2>
            <p style="color: #ffbb00; margin: 0; font-size: 12px; letter-spacing: 3px">中雷玩法</p>
          </div>
        </div>

        <svg class="kranok kranok-br" viewBox="0 0 100 100">
          <path d="M10 90 Q 10 10 90 10 L 70 30 Q 30 30 30 70 Z" />
        </svg>
      </div>

      <!-- 卡片 2: ODD/EVEN -->
      <div class="card" id="card2">
        <div class="sunburst"></div>

        <svg class="kranok kranok-tl" viewBox="0 0 100 100">
          <path d="M10 90 Q 10 10 90 10 L 70 30 Q 30 30 30 70 Z" />
        </svg>

        <canvas id="canvas2"></canvas>

        <div class="visual-container">
          <div class="pill-group">
            <div class="pill odd">ODD</div>
            <div class="pill even">EVEN</div>
          </div>
          <div class="jackpot-counter">฿ 880,500</div>
          <div class="win-ticker">User 23*** won ฿1,200</div>
          <div style="margin-top: 80px; text-align: center">
            <h2 style="color: white; margin: 0; font-size: 28px">ODD/EVEN</h2>
            <p style="color: #ffbb00; margin: 0; font-size: 12px; letter-spacing: 3px">猜奇偶玩法</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      /**
       * 物理金币粒子引擎
       */
      class CoinParticle {
        constructor(canvas) {
          this.canvas = canvas
          this.ctx = canvas.getContext('2d')
          this.init()
        }

        init() {
          this.radius = 12
          this.x = Math.random() * (this.canvas.width - this.radius * 2) + this.radius
          this.y = -20
          this.vx = (Math.random() - 0.5) * 4.5
          this.vy = Math.random() * 2.2 + 1.2
          this.gravity = 0.12
          this.bounce = 0.4
          this.rotation = Math.random() * 360
          this.rotationSpeed = Math.random() * 10 - 5
        }

        update() {
          this.vy += this.gravity
          this.x += this.vx
          this.y += this.vy

          // 底部碰撞反弹
          if (this.y + this.radius > this.canvas.height - 20) {
            this.y = this.canvas.height - 20 - this.radius
            this.vy *= -this.bounce
            this.vx *= 0.8 // 摩擦力
          }

          // 侧壁碰撞
          if (this.x + this.radius > this.canvas.width || this.x - this.radius < 0) {
            this.vx *= -1
          }

          this.rotation += this.rotationSpeed
        }

        draw() {
          const ctx = this.ctx
          ctx.save()
          ctx.translate(this.x, this.y)
          ctx.rotate((this.rotation * Math.PI) / 180)

          // 绘制金币 (฿ 泰铢符号)
          ctx.beginPath()
          ctx.arc(0, 0, this.radius, 0, Math.PI * 2)
          const grad = ctx.createLinearGradient(-10, -10, 10, 10)
          grad.addColorStop(0, '#fff5c3')
          grad.addColorStop(0.5, '#ffbb00')
          grad.addColorStop(1, '#8b4513')
          ctx.fillStyle = grad
          ctx.fill()
          ctx.strokeStyle = '#fff'
          ctx.lineWidth = 1
          ctx.stroke()

          ctx.fillStyle = 'rgba(0,0,0,0.5)'
          ctx.font = 'bold 12px Arial'
          ctx.textAlign = 'center'
          ctx.textBaseline = 'middle'
          ctx.fillText('฿', 0, 0)

          ctx.restore()
        }
      }

      function setupCanvas(canvasId) {
        const canvas = document.getElementById(canvasId)
        const card = canvas.closest('.card')
        canvas.width = 360
        canvas.height = 480

        let particles = []
        const maxParticles = 15

        function animate() {
          canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height)

          if (particles.length < maxParticles && Math.random() < 0.05) {
            particles.push(new CoinParticle(canvas))
          }

          particles.forEach((p, i) => {
            p.update()
            p.draw()
            // 如果金币停止运动则重置
            if (Math.abs(p.vy) < 0.1 && p.y > canvas.height - 40) {
              p.init()
            }
          })
          requestAnimationFrame(animate)
        }
        animate()
      }

      // 初始化金币系统
      setupCanvas('canvas1')
      setupCanvas('canvas2')

      /**
       * 3D 视差倾斜效果
       */
      document.querySelectorAll('.card').forEach((card) => {
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect()
          const x = e.clientX - rect.left
          const y = e.clientY - rect.top

          const rX = (y - rect.height / 2) / -10
          const rY = (x - rect.width / 2) / 10

          card.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg) scale(1.05)`

          // 内部视差位移
          const visual = card.querySelector('.visual-container')
          visual.style.transform = `translateZ(60px) translateX(${rY}px) translateY(${-rX}px)`
        })

        card.addEventListener('mouseleave', () => {
          card.style.transform = `rotateX(0) rotateY(0) scale(1)`
          card.querySelector('.visual-container').style.transform = `translateZ(50px)`
        })
      })

      // 模拟奖池跳动
      setInterval(() => {
        document.querySelectorAll('.jackpot-counter').forEach((el) => {
          let val = parseInt(el.innerText.replace(/[฿, ]/g, ''))
          val += Math.floor(Math.random() * 100)
          el.innerText = '฿ ' + val.toLocaleString()
        })
      }, 2000)
    </script>
  </body>
</html>

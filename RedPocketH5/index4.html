<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thai Royal Elite Wheel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@700;900&family=Montserrat:wght@900&display=swap');

      :root {
        --thai-red-deep: #4a0000;
        --thai-red-bright: #8b0000;
        --gold-gradient: linear-gradient(180deg, #fff5c3 0%, #ffbb00 50%, #8b4513 100%);
        --neon-cyan: #00f2ff;
      }

      body {
        margin: 0;
        height: 100vh;
        background: #050000;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Kanit', sans-serif;
        overflow: hidden;
      }

      /* 1. 环境光与质感 */
      .ambient-bg {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center, var(--thai-red-bright) 0%, #050000 80%);
        opacity: 0.6;
        z-index: 1;
      }
      .velvet-texture {
        position: fixed;
        inset: 0;
        opacity: 0.05;
        pointer-events: none;
        z-index: 2;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }

      /* 2. 顶部奖池 (Standalone) */
      .jp-container {
        position: absolute;
        top: 30px;
        z-index: 100;
        text-align: center;
      }
      .jp-amount {
        font-family: 'Montserrat', sans-serif;
        font-size: 72px;
        font-weight: 900;
        background: var(--gold-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.8));
        margin: 0;
      }

      /* 3. 转盘系统核心容器 */
      .wheel-system {
        position: relative;
        width: 640px;
        height: 640px;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10;
      }

      /* 3D 机械外框层 */
      .outer-frame {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #333, #111, #333);
        border-radius: 50%;
        border: 4px solid #5d1a1a;
        box-shadow:
          0 30px 60px rgba(0, 0, 0, 0.8),
          inset 0 0 30px #000;
      }

      /* LED 灯珠轨道 (规整圆形) */
      .led-track {
        position: absolute;
        width: 92%;
        height: 92%;
        border-radius: 50%;
        background: #000;
        box-shadow: inset 0 0 15px rgba(255, 187, 0, 0.2);
      }

      .led-bulb {
        position: absolute;
        width: 14px;
        height: 14px;
        background: #fff;
        border-radius: 50%;
        left: calc(50% - 7px);
        top: 10px;
        transform-origin: 7px 285px; /* 精确计算的圆心距离 */
        box-shadow:
          0 0 5px #fff,
          0 0 15px var(--gold-main);
        animation: ledFlow 2s infinite linear;
      }

      @keyframes ledFlow {
        0%,
        100% {
          opacity: 0.3;
          filter: brightness(1);
        }
        50% {
          opacity: 1;
          filter: brightness(1.5) blur(1px);
        }
      }

      /* 4. 转盘本体 */
      .wheel-main {
        position: relative;
        width: 520px;
        height: 520px;
        border-radius: 50%;
        border: 10px solid #2a0505;
        transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1);
        background: conic-gradient(
          #8b0000 0deg 45deg,
          #1a1a1a 45deg 90deg,
          #8b0000 90deg 135deg,
          #1a1a1a 135deg 180deg,
          #8b0000 180deg 225deg,
          #1a1a1a 225deg 270deg,
          #8b0000 270deg 315deg,
          #1a1a1a 315deg 360deg
        );
        z-index: 5;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
      }

      /* 表面反光玻璃层 */
      .wheel-main::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15) 0%,
          transparent 40%,
          rgba(255, 255, 255, 0.05) 100%
        );
        border-radius: 50%;
        pointer-events: none;
      }

      /* 扇区内容容器 */
      .slice-item {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        padding-top: 40px;
        box-sizing: border-box;
        transform-origin: center;
        font-weight: 900;
        font-size: 24px;
        color: #fff;
      }

      /* 5. 中心 SPIN 按钮 (3D 效果) */
      .center-hub {
        position: absolute;
        width: 150px;
        height: 150px;
        background: var(--gold-gradient);
        border-radius: 50%;
        border: 8px solid #2a0505;
        z-index: 20;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.8),
          inset 0 4px 6px rgba(255, 255, 255, 0.6);
        transition: 0.1s;
      }
      .center-hub:hover {
        transform: scale(1.05);
        filter: brightness(1.1);
      }
      .center-hub:active {
        transform: scale(0.95);
      }
      .center-hub span {
        font-size: 32px;
        color: #1a0000;
        line-height: 1;
      }

      /* 高级霓虹指针 */
      .modern-pointer {
        position: absolute;
        top: -55px;
        width: 70px;
        height: 100px;
        z-index: 30;
        filter: drop-shadow(0 0 20px var(--neon-cyan));
      }
    </style>
  </head>
  <body>
    <div class="ambient-bg"></div>
    <div class="velvet-texture"></div>

    <div class="jp-container">
      <p style="color: #ffcc00; letter-spacing: 8px; margin: 0">SUPER JACKPOT</p>
      <h1 class="jp-amount" id="jp-num">฿ 5,290,463</h1>
    </div>

    <div class="wheel-system">
      <!-- 3D 外框层 -->
      <div class="outer-frame"></div>

      <!-- 规整的 LED 灯圈轨道 -->
      <div class="led-track" id="led-track">
        <!-- JS 填充 24 颗规整灯珠 -->
      </div>

      <!-- 指针 -->
      <svg class="modern-pointer" viewBox="0 0 100 120">
        <defs>
          <linearGradient id="ptrGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#00f2ff" />
            <stop offset="100%" stop-color="#0066ff" />
          </linearGradient>
        </defs>
        <path d="M50 120 L10 20 L90 20 Z" fill="url(#ptrGrad)" />
        <circle cx="50" cy="35" r="10" fill="#fff" opacity="0.5" />
      </svg>

      <!-- 转盘本体 -->
      <div class="wheel-main" id="wheel-body">
        <!-- 扇区由 JS 生成 -->
      </div>

      <!-- 中心按钮 -->
      <div class="center-hub" id="spin-btn">
        <span>SPIN</span>
        <small style="font-size: 10px; color: #1a0000; font-weight: 900">กดเพื่อลุ้น</small>
      </div>
    </div>

    <script>
      const prizes = [
        { t: '฿ 5,000', i: '💰' },
        { t: 'X 5', i: '⭐' },
        { t: '฿ 1,000', i: '💎' },
        { t: 'JACKPOT', i: '👑' },
        { t: '฿ 2,000', i: '💰' },
        { t: 'X 10', i: '🔥' },
        { t: '฿ 500', i: '💎' },
        { t: 'X 2', i: '⭐' },
      ]

      const wheel = document.getElementById('wheel-body')
      const ledTrack = document.getElementById('led-track')
      const spinBtn = document.getElementById('spin-btn')
      let rotation = 0

      // 1. 初始化规整的 LED 灯珠
      for (let i = 0; i < 24; i++) {
        const bulb = document.createElement('div')
        bulb.className = 'led-bulb'
        bulb.style.transform = `rotate(${i * 15}deg)`
        bulb.style.animationDelay = `${i * 0.1}s`
        ledTrack.appendChild(bulb)
      }

      // 2. 初始化转盘内容 (基于中心旋转)
      prizes.forEach((p, i) => {
        const item = document.createElement('div')
        item.className = 'slice-item'
        item.style.transform = `rotate(${i * 45 + 22.5}deg)`

        // 针对 JACKPOT 进行特殊样式处理
        const colorStyle = p.t === 'JACKPOT' ? 'color:#ffbb00; text-shadow:0 0 10px #ffbb00' : ''

        item.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; ${colorStyle}">
                    <span style="font-size:32px; margin-bottom:5px;">${p.i}</span>
                    <span>${p.t}</span>
                </div>
            `
        wheel.appendChild(item)
      })

      // 3. 抽奖逻辑
      spinBtn.addEventListener('click', () => {
        if (spinBtn.style.pointerEvents === 'none') return
        spinBtn.style.pointerEvents = 'none'

        // 基础旋转 5 圈 + 随机角度
        const addRot = 1800 + Math.floor(Math.random() * 360)
        rotation += addRot
        wheel.style.transform = `rotate(${rotation}deg)`

        // 灯珠加速效果
        const bulbs = document.querySelectorAll('.led-bulb')
        bulbs.forEach((b) => (b.style.animationDuration = '0.5s'))

        setTimeout(() => {
          spinBtn.style.pointerEvents = 'auto'
          bulbs.forEach((b) => (b.style.animationDuration = '2s'))
          alert('ยินดีด้วย! คุณได้รับรางวัล (恭喜！你中奖了)')
        }, 6000)
      })

      // 4. 奖池跳动逻辑
      setInterval(() => {
        const jp = document.getElementById('jp-num')
        let val = parseInt(jp.innerText.replace(/[฿, ]/g, ''))
        val += Math.floor(Math.random() * 888)
        jp.innerText = '฿ ' + val.toLocaleString()
      }, 2000)
    </script>
  </body>
</html>
